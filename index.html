<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEAM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ======================================================
       NAV (shared across views)
  ====================================================== -->
  <nav class="nav">
    <button class="nav__logo" id="nav-logo">SEAM</button>

    <div class="nav__user-wrap">
      <button class="nav__user" id="nav-user-btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        <span>Matt-welch</span>
        <svg class="icon icon--sm nav__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- User Dropdown -->
      <div class="dropdown" id="user-dropdown" hidden>
        <div class="dropdown__header">
          <p class="dropdown__name">Matt-welch</p>
          <p class="dropdown__email">matt@seam.studio</p>
        </div>
        <div class="dropdown__divider"></div>
        <button class="dropdown__item">
          <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          Profile
        </button>
        <button class="dropdown__item">
          <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </button>
        <div class="dropdown__divider"></div>
        <button class="dropdown__item dropdown__item--danger" id="signout-btn">
          <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </button>
      </div>
    </div>
  </nav>

  <!-- ======================================================
       VIEW: HOME
  ====================================================== -->
  <main class="main" id="view-home">

    <div class="section-header">
      <div>
        <h1 class="section-header__title">Projects</h1>
        <p class="section-header__meta" id="project-count">5 active &middot; 1 paused</p>
      </div>
      <button class="btn btn--primary" id="new-project-btn">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New Project
      </button>
    </div>

    <!-- Active grid -->
    <div class="card-grid" id="active-grid"></div>

    <!-- Paused section -->
    <div class="paused-section" id="paused-section">
      <h3 class="paused-section__label">PAUSED</h3>
      <div class="card-grid" id="paused-grid"></div>
    </div>

  </main>

  <!-- ======================================================
       VIEW: PROJECT DETAIL
  ====================================================== -->
  <main class="main" id="view-detail" hidden>

    <div class="detail-topbar">
      <button class="back-link" id="back-btn">
        <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Projects
      </button>
      <button class="btn btn--primary" id="save-btn">Save Changes</button>
    </div>

    <div class="detail-layout">

      <!-- Left: form fields -->
      <div class="detail-left">
        <div class="field-group">
          <label class="field-label">PROJECT NAME</label>
          <input class="field-input" id="detail-name" type="text" placeholder="Project name" />
        </div>
        <div class="field-group">
          <label class="field-label">SUPPLIER</label>
          <input class="field-input" id="detail-supplier" type="text" placeholder="Supplier name" />
        </div>
        <div class="field-group">
          <label class="field-label">NOTES</label>
          <textarea class="field-input field-input--textarea" id="detail-notes" placeholder="Add any project notes, specifications, or context..."></textarea>
        </div>
      </div>

      <!-- Right: panels -->
      <div class="detail-right">

        <!-- Status panel -->
        <div class="panel">

          <div class="panel__section">
            <p class="panel__label">CURRENT STATUS</p>
            <div class="panel__row">
              <div class="select-wrap">
                <select class="status-select" id="detail-status">
                  <option value="sampling">Sampling</option>
                  <option value="production">Production</option>
                  <option value="review">Review</option>
                  <option value="briefing">Briefing</option>
                  <option value="shipping">Shipping</option>
                  <option value="completed">Completed</option>
                </select>
                <svg class="select-chevron icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="6 9 12 15 18 9"/>
                </svg>
              </div>
              <button class="toggle-btn" id="detail-priority-btn">
                <svg class="icon icon--xs" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M4 4h16v10l-8 4-8-4V4z"/>
                </svg>
                Priority
              </button>
              <button class="toggle-btn" id="detail-paused-btn">
                <svg class="icon icon--xs" viewBox="0 0 24 24" fill="currentColor">
                  <rect x="6" y="4" width="4" height="16" rx="1"/>
                  <rect x="14" y="4" width="4" height="16" rx="1"/>
                </svg>
                Paused
              </button>
            </div>
          </div>

          <div class="panel__section panel__section--border">
            <p class="panel__label">TO-DO LIST</p>
            <ul class="todo-list" id="todo-list">
              <!-- todos rendered by JS -->
            </ul>
            <p class="todo-empty" id="todo-empty">No to-dos yet. Add one to get started.</p>
            <div class="todo-input-row" id="todo-input-row" hidden>
              <input class="field-input todo-input" id="todo-input" type="text" placeholder="Add a to-do..." />
              <button class="btn btn--primary btn--sm" id="todo-confirm-btn">Add</button>
              <button class="btn btn--ghost btn--sm" id="todo-cancel-btn">Cancel</button>
            </div>
            <button class="dashed-btn" id="todo-add-btn">
              <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Add To-Do
            </button>
          </div>

          <div class="panel__section panel__section--border">
            <p class="panel__label">ACTION OWNER</p>
            <div class="segmented" id="action-owner">
              <button class="segmented__btn segmented__btn--active" data-value="yours">Your Action</button>
              <button class="segmented__btn" data-value="supplier">Waiting on Supplier</button>
            </div>
          </div>

        </div>

        <!-- Files panel -->
        <div class="panel">
          <div class="panel__section">
            <p class="panel__label">FILES &amp; ATTACHMENTS</p>
            <ul class="file-list" id="file-list"></ul>
            <label class="dashed-btn dashed-btn--upload" for="file-input">
              <svg class="icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="16 16 12 12 8 16"/>
                <line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
              </svg>
              Upload File
            </label>
            <input type="file" id="file-input" hidden multiple />
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- ======================================================
       MODAL: NEW PROJECT
  ====================================================== -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title">New Project</h2>
        <button class="modal__close" id="modal-close-btn" aria-label="Close">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal__body">
        <div class="field-group">
          <label class="field-label" for="modal-name">PROJECT NAME</label>
          <input class="field-input" id="modal-name" type="text" placeholder="e.g. SS25 Organic Cotton Hoodie" />
        </div>
        <div class="field-group">
          <label class="field-label" for="modal-supplier">SUPPLIER</label>
          <input class="field-input" id="modal-supplier" type="text" placeholder="e.g. Sunrise Textiles" />
        </div>
        <div class="field-group">
          <label class="field-label" for="modal-status">INITIAL STATUS</label>
          <div class="select-wrap">
            <select class="field-input status-select" id="modal-status">
              <option value="briefing">Briefing</option>
              <option value="sampling">Sampling</option>
              <option value="production">Production</option>
              <option value="review">Review</option>
              <option value="shipping">Shipping</option>
              <option value="completed">Completed</option>
            </select>
            <svg class="select-chevron icon icon--sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn--primary" id="modal-create-btn">Create Project</button>
      </div>
    </div>
  </div>

  <!-- Login Overlay -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-card">
      <div class="login-card__header">
        <h1 class="login-card__title">SEAM</h1>
        <p class="login-card__sub">Sign in to continue</p>
      </div>
      <div class="field-group">
        <label class="field-label" for="login-username">USERNAME</label>
        <input class="field-input" id="login-username" type="text" placeholder="Username" autocomplete="username" />
      </div>
      <div class="field-group">
        <label class="field-label" for="login-password">PASSWORD</label>
        <input class="field-input" id="login-password" type="password" placeholder="Password" autocomplete="current-password" />
      </div>
      <p class="login-card__error" id="login-error" hidden>Incorrect username or password.</p>
      <button class="btn btn--primary login-card__btn" id="login-btn">Sign In</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
